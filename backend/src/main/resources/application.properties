# ===================================
# RahiCabs – application.properties
# Active profile: dev (H2 in-memory)
# Switch to 'prod' for PostgreSQL
# ===================================
spring.application.name=rahicabs-backend
server.port=8080

# ---------- Active Profile ----------
spring.profiles.active=dev

# ---------- JPA ----------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ---------- JWT ----------
app.jwt.secret=RahiCabsSuperSecretKeyForJWT2024MustBe256BitsLongForHS256Algorithm!
app.jwt.expiration-ms=86400000

# ---------- OTP Configuration ----------
app.otp.expiry-minutes=5
app.otp.max-attempts=3
app.otp.rate-limit-minutes=1

# ---------- MSG91 SMS Configuration ----------
# Get your authkey from https://control.msg91.com/signin/
app.sms.msg91.authkey=YOUR_MSG91_AUTHKEY
# Create a template at MSG91 dashboard (must be DLT approved for India)
app.sms.msg91.template-id=YOUR_TEMPLATE_ID
# Sender ID (6-char, DLT registered)
app.sms.msg91.sender-id=RAHICB
app.sms.enabled=false

# ---------- Email (Gmail SMTP) ----------
# 1. Enable 2FA on your Gmail account
# 2. Go to Google Account → Security → App Passwords → generate one
# 3. Use that 16-char app password below (NOT your real Gmail password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL@gmail.com
spring.mail.password=YOUR_16_CHAR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.email.enabled=false
app.email.from=noreply@rahicab.com
app.email.from-name=RahiCab

# ---------- Admin Contact ----------
app.admin.phone=9999999999
app.admin.email=admin@rahicab.com

# ---------- Google Maps ----------
# Enable: Maps JavaScript API, Places API, Geocoding API, Distance Matrix API
app.google.maps.key=AIzaSyAr3AgCh-XDEv5mC3sZHREQuCjCyLp5cVA

# ---------- Fare Configuration ----------
app.fare.per-km=11.0
app.fare.advance-percentage=15.0

# ---------- Razorpay Configuration ----------
app.razorpay.key-id=rzp_test_T6BrM78Y3jXOpe
app.razorpay.key-secret=nnyHXrwE3isf032ftmmbeMuT

# ---------- CORS ----------
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
