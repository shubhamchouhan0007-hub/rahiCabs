# ===================================
# RahiCabs – application.properties
# Active profile: dev (H2 in-memory)
# Switch to 'prod' for PostgreSQL
# ===================================
spring.application.name=rahicabs-backend
server.port=8080

# ---------- Active Profile ----------
spring.profiles.active=dev

# ---------- JPA ----------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ---------- JWT ----------
app.jwt.secret=RahiCabsSuperSecretKeyForJWT2024MustBe256BitsLongForHS256Algorithm!
app.jwt.expiration-ms=86400000

# ---------- OTP Configuration ----------
app.otp.expiry-minutes=5
app.otp.max-attempts=3
app.otp.rate-limit-minutes=1

# ---------- Fare Configuration ----------
app.fare.per-km=11.0
app.fare.advance-percentage=15.0

# ---------- Razorpay Configuration ----------
app.razorpay.key-id=your_razorpay_key_id
app.razorpay.key-secret=your_razorpay_key_secret

# ---------- CORS ----------
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
