# ===================================================
# PRODUCTION profile — PostgreSQL + env-var secrets
# Activate with: SPRING_PROFILES_ACTIVE=prod
# Every ${VAR} must be supplied by the host environment.
# ===================================================

# ---------- PostgreSQL ----------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Connection pool sized for a small VPS (tune up with traffic)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
# Neon closes idle connections (~5 min) — recycle/keep them alive before that so
# requests never hit a dead connection (the source of the earlier stall warnings)
spring.datasource.hikari.max-lifetime=280000
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.validation-timeout=5000

# Use 'update' for the very first deploy to create tables, then switch to 'validate'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Keep open-in-view on (Spring Boot default) — the app lazily loads entity
# relationships during JSON serialization, so the session must stay open.
spring.jpa.open-in-view=true

# H2 console must never be on in production
spring.h2.console.enabled=false

# ---------- Secrets (from environment) ----------
app.jwt.secret=${JWT_SECRET}
app.google.maps.key=${GOOGLE_MAPS_KEY}
app.razorpay.key-id=${RAZORPAY_KEY_ID}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET}

# ---------- SMS (MSG91) ----------
app.sms.msg91.authkey=${MSG91_AUTHKEY:}
app.sms.msg91.template-id=${MSG91_TEMPLATE_ID:}
app.sms.msg91.sender-id=${MSG91_SENDER_ID:RAHICB}
app.sms.enabled=${SMS_ENABLED:false}

# ---------- Email (Gmail SMTP) ----------
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
app.email.enabled=${EMAIL_ENABLED:false}

# ---------- Admin owner account ----------
app.admin.owner-password=${OWNER_ADMIN_PASSWORD:Rahi@Admin2026}

# ---------- CORS (your deployed frontend domain) ----------
app.cors.allowed-origins=${CORS_ORIGINS}

# ---------- Firebase (phone-auth OTP verification) ----------
# Full service-account JSON, pasted as a single env var value
app.firebase.service-account=${FIREBASE_SERVICE_ACCOUNT:}
